<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayList Manager</title>
    <link rel="stylesheet" href="/css/playlist/playlist.css">
</head>
<body>
<div class="container">
    <nav class="sidebar">
        <h2>PlayList</h2>
        <div id="playlists-container"></div>
        <br>
        <button id="add-btn">+ Create New Playlist</button>
    </nav>

    <div id="popup" class="popup hidden">
        <div class="popup-box">
            <h3>Create Playlist</h3>
            <input type="text" id="playlistName" placeholder="Playlist name">
            <input type="text" id="subItems" placeholder="Initial sub-headings (comma separated)">
            <div class="popup-actions">
                <button id="createPlaylist" class="btn-accent">Create</button> <br><br>
                <button id="closePopup" class="btn-accent">Cancel</button>
            </div>
        </div>
    </div>

    <div id="subheading-popup" class="popup hidden">
        <div class="popup-box">
            <h3>Add Sub-heading</h3>
            <input type="text" id="newSubheadingInput" placeholder="Enter sub-heading name">
            <div class="popup-actions">
                <button id="saveSubheading" class="btn-accent">Add</button>
                <button id="closeSubheadingPopup" class="btn-accent">Cancel</button>
            </div>
        </div>
    </div>

    <div id="content-popup" class="popup hidden">
        <div class="popup-box">
            <h3>Add Content</h3>
            <input type="text" id="contentTitle" placeholder="Title (e.g. Favorite Song)">

            <select id="contentType" class="modern-select">
                <option value="music">Music (URL or Local)</option>
                <option value="video">Video (Local File)</option>
                <option value="photo">Photo (Local File)</option>
                <option value="document">Document (Local File)</option>
                <option value="link">Link/URL</option>
            </select>

            <div id="input-wrapper">
                <input type="file" id="fileInput" class="modern-select">
                <input type="text" id="contentSource" class="hidden" placeholder="Paste Link/URL here">
            </div>

            <!-- ✅ ADDED THIS HIDDEN INPUT -->
            <input type="hidden" id="selectedPlaylistId" value="">

            <div class="popup-actions">
                <button id="saveContent" class="btn-accent">Add to Collection</button> <br> <br> <br>
                <button id="closeContentPopup" class="btn-accent">Cancel</button>
            </div>
        </div>
    </div>

    <main class="content">
        <header>
            <h1>My Collections</h1>
        </header>
        <div class="playlist-grid" id="playlist-grid"></div>
    </main>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/js/playlist/playlist.js"></script>
<script src="/js/playlist/playlistdata.js"></script>
</body>
</html>
